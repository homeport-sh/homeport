name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: go vet
        run: go vet ./cmd/...

      - name: go test
        run: go test ./cmd/...

      - name: bash syntax (bootstrap + embedded homeportd)
        run: |
          bash -n bootstrap/bootstrap.sh
          awk "/<<'HOMEPORTD_SCRIPT'/{f=1;next} /^HOMEPORTD_SCRIPT\$/{f=0} f" \
            bootstrap/bootstrap.sh | bash -n /dev/stdin

      - name: shellcheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S error bootstrap/bootstrap.sh

      - name: homeportd unit tests (bash 5 — runs the full suite incl. gateway)
        run: bash test/homeportd_test.sh
